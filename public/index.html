<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon LLM — 4P Couch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a; color: #e0e0e0;
  font-family: 'Courier New', monospace;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 14px; gap: 10px;
}
h1 { color: #ffcc00; font-size: 1.2rem; letter-spacing: 2px; }
.subtitle { color:#555; font-size:.65rem; letter-spacing:1px; margin-top:-6px; }

/* ── 2×2 couch grid ── */
.couch {
  display: grid;
  grid-template-columns: repeat(2, minmax(300px, 380px));
  gap: 10px;
}
.pcell {
  border: 3px solid var(--pc, #444);
  border-radius: 6px; background:#0d0d12;
  padding: 6px; cursor: pointer;
  display:flex; flex-direction:column; gap:4px;
  transition: box-shadow .15s;
}
.pcell.selected { box-shadow: 0 0 12px var(--pc); }
.pcell.idle { opacity:.55; }
.p1 { --pc:#e74c3c; } .p2 { --pc:#3498db; } .p3 { --pc:#2ecc71; } .p4 { --pc:#f1c40f; }

.phead { display:flex; justify-content:space-between; align-items:center; font-size:.7rem; }
.ptag {
  color:#000; background:var(--pc); font-weight:bold;
  padding:1px 8px; border-radius:3px; letter-spacing:1px;
}
.psess { color:#ccc; letter-spacing:1px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:34%; }
.parea { color:#888; letter-spacing:1px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; flex:1; text-align:center; }
.pturn { color:#666; }
.cell-halt {
  background:#1a0000; border:1px solid #7a1111; border-radius:3px;
  color:#ff6666; cursor:pointer; font-size:.7rem; padding:0 5px; line-height:1.3;
}
.cell-halt:hover { background:#3a0000; border-color:#dd2222; }
.cell-remove {
  background:#111; border:1px solid #555; border-radius:3px;
  color:#999; cursor:pointer; font-size:.7rem; padding:0 5px; line-height:1.3; margin-left:3px;
}
.cell-remove:hover { background:#333; border-color:#999; color:#fff; }
.pcv { display:block; image-rendering:pixelated; width:100%; background:#111; }

.phud { display:flex; align-items:center; gap:6px; font-size:.65rem; min-height:16px; }
.pmon { color:#7ec8e3; font-weight:bold; white-space:nowrap; }
.hp-bar { flex:1; height:6px; background:#1a1a1a; border-radius:2px; overflow:hidden; }
.hp-fill { height:100%; }
.hp-fill.high{background:#44dd44;} .hp-fill.mid{background:#ffcc00;} .hp-fill.low{background:#dd2222;}
.pbadges { color:#ffcc00; white-space:nowrap; }

.pmsg {
  font-size:.62rem; color:#aaa; min-height:26px; max-height:26px; overflow:hidden;
  background:#0d1117; border:1px solid #22262e; border-radius:2px; padding:2px 5px;
  line-height:1.25;
}
.pwait {
  display:flex; align-items:center; justify-content:center;
  color:#666; font-size:.8rem; letter-spacing:2px;
  animation: blink 1.4s step-end infinite;
}
@keyframes blink { 50% { opacity:.25; } }

/* ── Bottom row: detail drawer + chat ── */
.bottom {
  display:grid; grid-template-columns: 1fr 300px;
  gap:10px; width:100%; max-width:790px;
}
.panel {
  background:#111; border:1px solid #2a2a2a; border-radius:4px;
  padding:10px; font-size:.74rem;
}
.panel h2 { color:#ffcc00; font-size:.8rem; margin-bottom:6px; border-bottom:1px solid #2a2a2a; padding-bottom:3px; }
.drawer-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.drawer-cols { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.pcard { background:#16162a; border:1px solid #333; border-radius:3px; padding:6px; margin-bottom:5px; }
.pname { font-weight:bold; color:#7ec8e3; font-size:.72rem; }
.moves { margin-top:3px; display:flex; flex-wrap:wrap; gap:3px; }
.mtag { background:#1a1a2a; border:1px solid #444; border-radius:8px; padding:0 6px; font-size:.62rem; }
.hp-label { display:flex; justify-content:space-between; font-size:.66rem; }
.hp-bar2 { height:6px; background:#1a1a1a; border-radius:2px; overflow:hidden; margin-top:2px; }

.inv-item {
  background:#0d1117; border:1px solid #2a2a2a; border-radius:3px;
  padding:3px 7px; display:flex; justify-content:space-between; font-size:.68rem; margin-bottom:3px;
}
.inv-money { color:#ffcc00; font-size:.7rem; margin-top:4px; }

.log-wrap { max-height:120px; overflow-y:auto; }
.log-wrap::-webkit-scrollbar { width:4px; }
.log-wrap::-webkit-scrollbar-thumb { background:#333; }
.log-e { padding:1px 0; border-bottom:1px solid #1a1a1a; color:#888; font-size:.66rem; }
.log-e:first-child { color:#ddd; }

.starter-row { display:flex; gap:6px; margin-top:6px; }
.sbtn {
  flex:1; background:#0d1a0d; border:1px solid #2a5a2a; border-radius:4px;
  color:#ccffcc; padding:5px 4px; cursor:pointer; font-family:inherit; font-size:.66rem;
}
.sbtn:hover { border-color:#ffcc00; }

.tbadge { display:inline-block; padding:0 5px; border-radius:7px; font-size:.58rem; margin-left:2px; }
.t-grass{background:#2d6a2d;} .t-fire{background:#7a3010;} .t-water{background:#10407a;}
.t-electric{background:#7a7010;} .t-normal{background:#4a4a4a;} .t-rock{background:#5a4a20;}
.t-ground{background:#6a4a10;} .t-flying{background:#2a4a7a;} .t-poison{background:#4a107a;} .t-bug{background:#5a6a10;}

/* ── Chat ── */
.chat-msgs {
  max-height:190px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; margin-bottom:8px;
}
.chat-msgs::-webkit-scrollbar { width:4px; }
.chat-msgs::-webkit-scrollbar-thumb { background:#333; }
.chat-msg { font-size:.68rem; line-height:1.4; }
.chat-msg .cu { color:#ffcc00; font-weight:bold; }
.chat-msg .ct { color:#ccc; }
.chat-msg .cs { color:#557755; font-style:italic; }
.chat-input-row { display:flex; gap:5px; }
.chat-input {
  flex:1; background:#0d1117; border:1px solid #333; border-radius:3px;
  color:#fff; padding:5px 8px; font-family:inherit; font-size:.7rem; outline:none;
}
.chat-send {
  background:#1a3a1a; border:1px solid #2a5a2a; border-radius:3px;
  color:#aaffaa; padding:5px 10px; cursor:pointer; font-size:.7rem;
}
.my-name-label { font-size:.6rem; color:#557755; margin-bottom:4px; }
</style>
</head>
<body>
<h1>🎮 POKÉMON LLM</h1>
<div class="subtitle">4-PLAYER COUCH MODE — CLICK A SCREEN TO INSPECT</div>

<div class="couch" id="couch"></div>

<div class="bottom">
  <div class="panel">
    <div class="drawer-head">
      <span class="ptag" id="d-tag" style="--pc:#e74c3c">P1</span>
      <h2 style="border:none;margin:0;padding:0" id="d-title">PLAYER 1</h2>
    </div>
    <div class="drawer-cols">
      <div>
        <h2>PARTY</h2>
        <div id="d-party"></div>
      </div>
      <div>
        <h2>🎒 BAG</h2>
        <div id="d-bag"></div>
        <div class="inv-money" id="d-money"></div>
        <h2 style="margin-top:8px">EVENT LOG</h2>
        <div class="log-wrap"><div id="d-log"></div></div>
        <div id="d-starter"></div>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>💬 OBSERVER CHAT</h2>
    <div class="my-name-label" id="my-name"></div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-in" placeholder="Say something..." maxlength="200" />
      <button class="chat-send" id="chat-send">Send</button>
    </div>
  </div>
</div>

<script>
// ── Per-player state ──────────────────────────────────────────────────────────
const MAXP = 4;
// Slot n (1-4, couch color) -> { sessionId, label, halted, state, map, cv, ctx }.
// Slots bind to server sessions (Pandora's #25 API): 'default' claims slot 1 at
// boot, further sessions fill free slots as they appear (session_created / boot
// list, most-recently-active first).
const players = {};
const slotOf = {};    // sessionId -> slot n
let selected = 1;

const PCOLORS = { 1:'#e74c3c', 2:'#3498db', 3:'#2ecc71', 4:'#f1c40f' };

// ── Pixel-art tile atlas (see docs/graphics-overhaul.md) ─────────────────────
// Every tile is 16x16 authored in code — no external art for the world.
const TILE = 16;
const TILE_NAMES = ['path','town','grass','tall_grass','tree','wall','water',
                    'building','door','sign','ledge_s','flower','default'];
let FRAME = 0;   // global 2-frame animation bit (water shimmer, walk bob)

function paintTile(c, name, f) {
  // c: 2d ctx translated so (0,0) is the tile's top-left. f: frame 0|1.
  const P = (x,y,w,h,col) => { c.fillStyle = col; c.fillRect(x,y,w,h); };
  switch (name) {
    case 'path': case 'town':
      P(0,0,16,16,'#b09a6a');
      P(3,4,1,1,'#98835a'); P(11,2,1,1,'#98835a'); P(7,9,1,1,'#98835a');
      P(13,12,1,1,'#98835a'); P(5,13,1,1,'#c4ae7e'); P(9,6,1,1,'#c4ae7e');
      break;
    case 'grass':
      P(0,0,16,16,'#3a8c3a');
      P(2,3,1,2,'#2d702d'); P(9,2,1,2,'#2d702d'); P(13,8,1,2,'#2d702d');
      P(5,11,1,2,'#2d702d'); P(11,13,1,2,'#48a848');
      break;
    case 'tall_grass':
      P(0,0,16,16,'#2d702d');
      for (let x=1;x<16;x+=3) { P(x,10,1,5,'#1a5c1a'); P(x+1,8,1,7,'#164c16'); }
      P(0,14,16,2,'#1a5c1a');
      break;
    case 'tree':
      P(0,0,16,16,'#3a8c3a');
      P(6,12,4,3,'#6a4a2a');                       // trunk
      P(2,7,12,5,'#1a4a1a'); P(3,4,10,4,'#215a21'); P(5,1,6,4,'#2a6a2a'); // canopy
      P(4,8,2,1,'#0f3a0f'); P(10,5,2,1,'#0f3a0f');
      break;
    case 'wall':
      P(0,0,16,16,'#3a3a3a');
      for (let y=0;y<16;y+=4) { P(0,y,16,1,'#2a2a2a'); }
      P(4,1,1,3,'#2a2a2a'); P(12,1,1,3,'#2a2a2a'); P(8,5,1,3,'#2a2a2a');
      P(4,9,1,3,'#2a2a2a'); P(12,9,1,3,'#2a2a2a'); P(8,13,1,3,'#2a2a2a');
      break;
    case 'water':
      P(0,0,16,16,'#1a4a8f');
      const o = f ? 3 : 0;
      P(1+o,3,4,1,'#3a6aaf'); P(9+o,7,4,1,'#3a6aaf'); P(3+o,12,4,1,'#3a6aaf');
      P(8-o,2,2,1,'#12376b'); P(2+o,8,2,1,'#12376b');
      break;
    case 'building':
      P(0,0,16,16,'#7a5a3a');
      P(0,0,16,5,'#8f3a2a');  P(0,4,16,1,'#6f2a1a');   // roof
      P(3,8,3,3,'#2a3a5a'); P(10,8,3,3,'#2a3a5a');     // windows
      P(3,8,3,1,'#4a5a7a'); P(10,8,3,1,'#4a5a7a');
      break;
    case 'door':
      P(0,0,16,16,'#7a5a3a');
      P(0,0,16,3,'#8f3a2a');
      P(5,5,6,11,'#3a2416'); P(6,6,4,10,'#4a2e1c'); P(9,10,1,2,'#c4ae7e'); // knob
      break;
    case 'sign':
      P(0,0,16,16,'#3a8c3a');
      P(7,9,2,6,'#6a4a2a');                           // post
      P(2,3,12,6,'#b8860b'); P(3,4,10,4,'#8a6508');   // board
      P(4,5,8,1,'#5a4205'); P(4,7,6,1,'#5a4205');     // "text"
      break;
    case 'ledge_s':
      P(0,0,16,16,'#b09a6a');
      P(0,12,16,2,'#7a683f'); P(0,14,16,2,'#5a4c2e');
      break;
    case 'flower':
      P(0,0,16,16,'#3a8c3a');
      const fo = f ? 1 : 0;
      P(4,4+fo,2,2,'#e74c3c'); P(5,3+fo,1,1,'#ffcc00');
      P(11,9-fo,2,2,'#e7813c'); P(12,8-fo,1,1,'#ffcc00');
      P(2,11,1,2,'#2d702d'); P(13,4,1,2,'#2d702d');
      break;
    default:
      P(0,0,16,16,'#141414');
  }
}

// Two prebuilt atlases (frame 0 / frame 1), one 16px cell per tile name.
const atlases = [0,1].map(f => {
  const a = document.createElement('canvas');
  a.width = TILE * TILE_NAMES.length; a.height = TILE;
  const c = a.getContext('2d');
  TILE_NAMES.forEach((name, i) => {
    c.save(); c.translate(i*TILE, 0);
    c.beginPath(); c.rect(0,0,TILE,TILE); c.clip();
    paintTile(c, name, f);
    c.restore();
  });
  return a;
});
const TILE_IX = Object.fromEntries(TILE_NAMES.map((n,i)=>[n,i]));

// GB-style pixel person, tinted. size = tile px on screen; bob = 1 to dip 1px.
function drawChar(ctx, sx, sy, size, tint, bob) {
  const u = size/16;
  const B = (x,y,w,h,col) => { ctx.fillStyle=col; ctx.fillRect(sx+x*u, sy+(y+bob)*u, w*u, h*u); };
  B(5,1,6,5,'#f0c8a0');           // head
  B(5,1,6,2,'#4a3020');           // hair
  B(6,3,1,1,'#222'); B(9,3,1,1,'#222');  // eyes
  B(4,6,8,6,tint);                // body
  B(3,7,1,3,tint); B(12,7,1,3,tint);     // arms
  B(5,12,2,3,'#333'); B(9,12,2,3,'#333');// legs
}

// ── Pokémon sprites: PokeAPI Gen-1 Red/Blue archive (see docs) ───────────────
const SPECIES_ID = {
  bulbasaur:1, ivysaur:2, venusaur:3, charmander:4, charmeleon:5, charizard:6,
  squirtle:7, wartortle:8, blastoise:9, caterpie:10, metapod:11, butterfree:12,
  weedle:13, kakuna:14, beedrill:15, pidgey:16, pidgeotto:17, rattata:19,
  raticate:20, spearow:21, pikachu:25, raichu:26, sandshrew:27, sandslash:28,
  diglett:50, dugtrio:51, meowth:52, geodude:74, graveler:75, onix:95, eevee:133,
};
const SPR_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-i/red-blue';
const spriteCache = {};
// The Gen-1 /back/ sprites have no transparent variant — chroma-key the white
// background at load time (offscreen canvas, near-white pixels -> alpha 0).
function keyOutWhite(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const x = c.getContext('2d');
  x.drawImage(img, 0, 0);
  try {
    const d = x.getImageData(0, 0, c.width, c.height);
    for (let i = 0; i < d.data.length; i += 4) {
      if (d.data[i] > 238 && d.data[i+1] > 238 && d.data[i+2] > 238) d.data[i+3] = 0;
    }
    x.putImageData(d, 0, 0);
  } catch (e) { /* canvas tainted (no CORS) — keep the white box over nothing */ }
  return c;
}
function getSprite(species, facing) {
  const id = SPECIES_ID[(species||'').toLowerCase()];
  if (!id) return null;
  const key = `${facing}${id}`;
  if (!(key in spriteCache)) {
    spriteCache[key] = undefined;   // in flight
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = facing === 'front' ? `${SPR_BASE}/transparent/${id}.png` : `${SPR_BASE}/back/${id}.png`;
    img.onload = () => { spriteCache[key] = facing === 'back' ? keyOutWhite(img) : img; renderAll(); };
    img.onerror = () => { spriteCache[key] = null; };
  }
  return spriteCache[key] || null;
}
function blitSprite(ctx, img, cx, bottomY, targetH) {
  // nearest-neighbor, bottom-anchored, centered on cx (img may be Image or canvas)
  const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
  const scale = targetH / ih;
  const w = iw * scale, h = targetH;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, Math.round(cx - w/2), Math.round(bottomY - h), Math.round(w), Math.round(h));
}

const TC_FALLBACK = { path:'#8b7355', town:'#8b7355', grass:'#3a8c3a', tall_grass:'#1a5c1a',
  tree:'#1a4a1a', wall:'#2a2a2a', water:'#1a4a8f', building:'#5a3a2a',
  door:'#8B4513', sign:'#b8860b', ledge_s:'#5a4a1a', flower:'#a0522d', default:'#111' };

// Build the four cells
const couch = document.getElementById('couch');
for (let n = 1; n <= MAXP; n++) {
  const cell = document.createElement('div');
  cell.className = `pcell p${n}` + (n === selected ? ' selected' : '');
  cell.id = `cell-${n}`;
  cell.innerHTML = `
    <div class="phead">
      <span class="ptag">P${n}</span>
      <span class="psess" id="sess-${n}">—</span>
      <span class="parea" id="area-${n}"></span>
      <span class="pturn" id="turn-${n}">T0</span>
      <button class="cell-halt" id="haltbtn-${n}" title="Signal this agent to stop">⛔</button>
      <button class="cell-remove" id="rmbtn-${n}" title="Remove this agent — frees the slot">✕</button>
    </div>
    <canvas class="pcv" id="cv-${n}" width="320" height="256"></canvas>
    <div class="phud" id="hud-${n}"></div>
    <div class="pmsg" id="msg-${n}"></div>`;
  cell.addEventListener('click', () => selectPlayer(n));
  couch.appendChild(cell);
  const cv = document.getElementById(`cv-${n}`);
  players[n] = { sessionId:null, label:null, halted:false, state:null, map:null, cv, ctx: cv.getContext('2d') };
  document.getElementById(`haltbtn-${n}`).addEventListener('click', (e) => {
    e.stopPropagation();
    toggleHalt(n);
  });
  document.getElementById(`rmbtn-${n}`).addEventListener('click', (e) => {
    e.stopPropagation();
    removeSlot(n);
  });
}

// Remove the agent in slot n from the server; the session_removed broadcast
// (below) blanks the slot for every spectator and backfills any waiting session.
async function removeSlot(n) {
  const p = players[n];
  if (!p.sessionId || p.sessionId === 'default') return;
  try {
    await fetch(`/session?session=${p.sessionId}`, { method: 'DELETE' });
  } catch (e) { console.error(e); }
}

// Blank a slot locally and pull in any session that had no slot yet.
function clearSlot(sessionId) {
  const n = slotOf[sessionId];
  if (!n) return;
  delete slotOf[sessionId];
  Object.assign(players[n], { sessionId:null, label:null, halted:false, state:null, map:null });
  renderCell(n);
  resyncSessions();
}

async function resyncSessions() {
  try {
    const list = await (await fetch('/sessions')).json();
    for (const s of list) if (!slotOf[s.sessionId]) bindSession(s);
  } catch (e) { console.error(e); }
}

async function toggleHalt(n) {
  const p = players[n];
  if (!p.sessionId) return;
  try {
    await fetch(`/halt?session=${p.sessionId}`, { method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(p.halted ? { clear:true } : {}) });
  } catch(e) { console.error(e); }
}

function selectPlayer(n) {
  selected = n;
  for (let i = 1; i <= MAXP; i++)
    document.getElementById(`cell-${i}`).classList.toggle('selected', i === n);
  updateDrawer();
}

// ── Rendering (parameterized per cell) ────────────────────────────────────────
function hpInfo(s){const[c,m]=s.split('/').map(Number);return{cur:c,max:m,f:m>0?c/m:0};}
function hpCls(f){return f>.5?'high':f>.25?'mid':'low';}
function typeTag(t){return`<span class="tbadge t-${t}">${t}</span>`;}

function drawOverworld(p) {
  const { ctx, cv, map, state } = p;
  const CW = cv.width, CH = cv.height;
  if (!map) { ctx.fillStyle='#111'; ctx.fillRect(0,0,CW,CH); return; }
  const { width:MW, height:MH, tiles, npcs } = map;
  const tsize = Math.min(Math.floor(CW/15), Math.floor(CH/12), 20);
  const px = state.player.position.x, py = state.player.position.y;
  const vCols = Math.ceil(CW/tsize)+2, vRows = Math.ceil(CH/tsize)+2;
  const sc = Math.max(0, px - Math.floor(vCols/2));
  const sr = Math.max(0, py - Math.floor(vRows/2));
  const ox = Math.floor(CW/2) - (px-sc)*tsize;
  const oy = Math.floor(CH/2) - (py-sr)*tsize;

  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle='#111'; ctx.fillRect(0,0,CW,CH);
  const atlas = atlases[FRAME];
  for (let r=sr; r<Math.min(MH,sr+vRows+1); r++) {
    for (let c=sc; c<Math.min(MW,sc+vCols+1); c++) {
      const tile=(tiles[r]||[])[c]||'wall';
      const sx=ox+(c-sc)*tsize, sy=oy+(r-sr)*tsize;
      const ix = TILE_IX[tile];
      if (ix !== undefined) ctx.drawImage(atlas, ix*TILE, 0, TILE, TILE, sx, sy, tsize, tsize);
      else { ctx.fillStyle = TC_FALLBACK[tile]||TC_FALLBACK.default; ctx.fillRect(sx,sy,tsize,tsize); }
    }
  }
  if (npcs) for (const nn of npcs) {
    if (nn.x<sc||nn.x>=sc+vCols||nn.y<sr||nn.y>=sr+vRows) continue;
    drawChar(ctx, ox+(nn.x-sc)*tsize, oy+(nn.y-sr)*tsize, tsize, '#b8860b', 0);
  }
  drawChar(ctx, ox+(px-sc)*tsize, oy+(py-sr)*tsize, tsize, p.color,
           (state.player.steps ?? state.turn) % 2 === FRAME ? 1 : 0);
}

function drawStarterSelect(p) {
  const { ctx, cv } = p;
  ctx.fillStyle='#0a0a12'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#ffcc00'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
  ctx.fillText("PROF. OAK'S LAB", cv.width/2, 30);
  ctx.fillStyle='#888'; ctx.font='10px Courier New';
  ctx.fillText('choosing a starter…', cv.width/2, 46);
  const trio = ['bulbasaur','charmander','squirtle'];
  trio.forEach((sp, i) => {
    const cx = cv.width*(0.25 + 0.25*i), by = cv.height*0.72;
    ctx.fillStyle='#222240';
    ctx.beginPath(); ctx.ellipse(cx, by+4, 30, 8, 0, 0, Math.PI*2); ctx.fill();
    const img = getSprite(sp, 'front');
    if (img) blitSprite(ctx, img, cx, by, 64);
    else { ctx.fillStyle='#444'; ctx.beginPath(); ctx.arc(cx, by-20, 18, 0, Math.PI*2); ctx.fill(); }
  });
  ctx.textAlign='left';
}

function drawBattle(p) {
  const { ctx, cv, state } = p;
  const CW = cv.width, CH = cv.height;
  const b = state.battle;
  // Gen-1 flat battle backdrop
  ctx.fillStyle='#f8f8e8'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#e0e0c8'; ctx.fillRect(0,CH-52,CW,52);
  // platforms
  ctx.fillStyle='#c8c89a';
  ctx.beginPath(); ctx.ellipse(CW*0.72,CH*0.42,58,12,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(CW*0.24,CH*0.80,52,11,0,0,Math.PI*2); ctx.fill();

  const ef=hpInfo(b.enemy.hp), af=hpInfo(b.your_active.hp);

  // sprites (front = enemy top-right, back = yours bottom-left)
  const eImg = getSprite(b.enemy.species, 'front');
  if (eImg) blitSprite(ctx, eImg, CW*0.72, CH*0.44, 96);
  else { ctx.fillStyle=ef.f>0?'#c04040':'#555'; ctx.beginPath(); ctx.arc(CW*0.72,CH*0.30,26,0,Math.PI*2); ctx.fill(); }
  const aImg = getSprite(b.your_active.species, 'back');
  if (aImg) blitSprite(ctx, aImg, CW*0.24, CH*0.82, 104);
  else { ctx.fillStyle=af.f>0?'#4040c0':'#555'; ctx.beginPath(); ctx.arc(CW*0.24,CH*0.68,22,0,Math.PI*2); ctx.fill(); }

  // Gen-1 info boxes
  function infoBox(x, y, w, mon, frac, showHp) {
    ctx.fillStyle='#f8f8e8'; ctx.fillRect(x,y,w,showHp?46:36);
    ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,showHp?46:36);
    ctx.fillStyle='#222'; ctx.font='bold 11px Courier New';
    ctx.fillText(`${mon.name}`, x+8, y+14);
    ctx.font='10px Courier New';
    ctx.fillText(`Lv.${mon.level}`, x+w-42, y+14);
    ctx.fillStyle='#222'; ctx.font='8px Courier New'; ctx.fillText('HP:', x+8, y+26);
    ctx.fillStyle='#a8a888'; ctx.fillRect(x+28, y+19, w-40, 8);
    ctx.fillStyle=frac>.5?'#30a030':frac>.25?'#d8a020':'#d03030';
    ctx.fillRect(x+28, y+19, Math.round((w-40)*frac), 8);
    if (showHp) { ctx.fillStyle='#222'; ctx.font='10px Courier New'; ctx.fillText(mon.hp, x+w-58, y+40); }
  }
  infoBox(8, 8, 148, b.enemy, ef.f, false);
  infoBox(CW-164, CH-100, 156, b.your_active, af.f, true);

  if (b.is_trainer && b.trainer_name) {
    ctx.fillStyle='rgba(20,20,20,.85)'; ctx.fillRect(0,CH-18,CW,18);
    ctx.fillStyle='#ffcc00'; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
    ctx.fillText(`TRAINER — ${b.trainer_name} (${(b.trainer_remaining||0)+1} left)`, CW/2, CH-6);
    ctx.textAlign='left';
  }
}

function renderCell(n) {
  const p = players[n];
  p.color = PCOLORS[n];
  const state = p.state;
  const cell = document.getElementById(`cell-${n}`);
  if (!p.sessionId || !state) {
    cell.classList.add('idle');
    document.getElementById(`sess-${n}`).textContent = '';
    const { ctx, cv } = p;
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#444'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
    ctx.fillText('WAITING FOR', cv.width/2, cv.height/2 - 10);
    ctx.fillText('CHALLENGER…', cv.width/2, cv.height/2 + 12);
    ctx.textAlign='left';
    return;
  }

  const idle = state.turn === 0 && !(state.player?.party||[]).length;
  cell.classList.toggle('idle', idle);

  document.getElementById(`sess-${n}`).textContent = (p.label || p.sessionId || '').toUpperCase();
  document.getElementById(`area-${n}`).textContent = (state.area?.name||'—').toUpperCase();
  document.getElementById(`turn-${n}`).textContent = `T${state.turn}`;
  document.getElementById(`haltbtn-${n}`).textContent = p.halted ? '▶' : '⛔';
  document.getElementById(`haltbtn-${n}`).title = p.halted ? 'Resume this agent' : 'Signal this agent to stop';

  const { ctx, cv } = p;
  ctx.clearRect(0,0,cv.width,cv.height);
  if (idle && !p.halted) {
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#444'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
    ctx.fillText('WAITING FOR', cv.width/2, cv.height/2 - 10);
    ctx.fillText('CHALLENGER…', cv.width/2, cv.height/2 + 12);
    ctx.textAlign='left';
  }
  else if (state.screen==='starter_select') drawStarterSelect(p);
  else if (state.screen==='battle'&&state.battle) drawBattle(p);
  else drawOverworld(p);
  if (p.halted) {
    ctx.fillStyle='rgba(40,0,0,.55)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#ff6666'; ctx.font='bold 16px Courier New'; ctx.textAlign='center';
    ctx.fillText('⛔ HALTED', cv.width/2, cv.height/2);
    ctx.textAlign='left';
  }

  // HUD: lead mon HP + badges
  const hud = document.getElementById(`hud-${n}`);
  const lead = (state.player?.party||[])[0];
  if (lead) {
    const hp = hpInfo(lead.hp);
    hud.innerHTML = `
      <span class="pmon">${lead.name} L${lead.level}</span>
      <div class="hp-bar"><div class="hp-fill ${hpCls(hp.f)}" style="width:${Math.round(hp.f*100)}%"></div></div>
      <span class="pbadges">${'🏅'.repeat(state.player?.badges||0) || ''}</span>
      <span style="color:#666">×${(state.player?.party||[]).length}</span>`;
  } else hud.innerHTML = `<span style="color:#555">no party</span>`;

  document.getElementById(`msg-${n}`).textContent = state.message || '';
  if (n === selected) updateDrawer();
}

function renderAll() { for (let n = 1; n <= MAXP; n++) renderCell(n); }

// 2-frame world animation: water shimmer + walk bob. 500ms, overworld cells only.
setInterval(() => {
  FRAME ^= 1;
  for (let n = 1; n <= MAXP; n++) {
    const s = players[n].state;
    if (s && s.screen === 'overworld') renderCell(n);
  }
}, 500);

// ── Detail drawer ─────────────────────────────────────────────────────────────
const ITEM_LABELS = {
  pokeball: '🔴 Poké Ball', great_ball: '🔵 Great Ball', potion: '💊 Potion',
};

async function chooseStarter(n, species) {
  const p = players[n];
  if (!p.sessionId) return;
  try {
    await fetch(`/action?session=${p.sessionId}`, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'choose_starter', species }) });
  } catch(e) { console.error(e); }
}

function updateDrawer() {
  const p = players[selected];
  const state = p.state;
  document.getElementById('d-tag').textContent = `P${selected}`;
  document.getElementById('d-tag').style.setProperty('--pc', PCOLORS[selected]);
  document.getElementById('d-title').textContent = p.sessionId
    ? `${(p.label || p.sessionId).toUpperCase()}${state?.area?.name ? ' — ' + state.area.name.toUpperCase() : ''}`
    : `PLAYER ${selected} — NO SESSION`;
  if (!state) return;

  const party = state.player?.party || [];
  document.getElementById('d-party').innerHTML = party.length ? party.map(m => {
    const hp = hpInfo(m.hp);
    return `<div class="pcard">
      <div class="pname">${m.name} <small>Lv.${m.level}</small>${(m.type||[]).map(typeTag).join('')}</div>
      <div class="hp-label"><span>HP</span><span>${m.hp}</span></div>
      <div class="hp-bar2"><div class="hp-fill ${hpCls(hp.f)}" style="width:${Math.round(hp.f*100)}%"></div></div>
      <div class="moves">${(m.moves||[]).map(mv=>`<span class="mtag">${mv}</span>`).join('')}</div>
    </div>`;
  }).join('') : '<div style="color:#555;font-size:.68rem">No POKéMON yet</div>';

  const bag = Object.entries(state.player?.bag||{}).filter(([,v])=>v>0);
  document.getElementById('d-bag').innerHTML = bag.length
    ? bag.map(([k,v])=>`<div class="inv-item"><span>${ITEM_LABELS[k]||k}</span><span>×${v}</span></div>`).join('')
    : '<div style="color:#555;font-size:.68rem">Empty</div>';
  document.getElementById('d-money').textContent = `₽ ${(state.player?.money||0).toLocaleString()}`;

  document.getElementById('d-log').innerHTML =
    (state.log||[]).map(l=>`<div class="log-e">${l}</div>`).join('');

  // Pass-the-controller — only the token-less default session accepts
  // spectator actions; authed sessions would 401.
  document.getElementById('d-starter').innerHTML = (state.screen === 'starter_select' && p.sessionId === 'default') ? `
    <h2 style="margin-top:8px">CHOOSE STARTER (P${selected})</h2>
    <div class="starter-row">
      <button class="sbtn" onclick="chooseStarter(${selected},'bulbasaur')">🌿 BULBA</button>
      <button class="sbtn" onclick="chooseStarter(${selected},'charmander')">🔥 CHAR</button>
      <button class="sbtn" onclick="chooseStarter(${selected},'squirtle')">💧 SQUIRT</button>
    </div>` : '';
}

// ── Chat ──────────────────────────────────────────────────────────────────────
let myName = '';
let ws;

function addChatMsg(msg) {
  const box = document.getElementById('chat-msgs');
  const atBottom = box.scrollTop >= box.scrollHeight - box.clientHeight - 10;
  const isSystem = msg.user === '—';
  const div = document.createElement('div');
  div.className = 'chat-msg' + (isSystem ? ' system' : '');
  if (isSystem) div.innerHTML = `<span class="cs">${msg.text}</span>`;
  else {
    const isMine = msg.user === myName;
    div.innerHTML = `<span class="cu">${isMine ? 'You' : msg.user}</span> <span class="ct">${msg.text}</span>`;
  }
  box.appendChild(div);
  if (atBottom || isSystem) box.scrollTop = box.scrollHeight;
}

function sendChat() {
  const inp = document.getElementById('chat-in');
  const text = inp.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type:'chat', text }));
  inp.value = '';
}
document.getElementById('chat-send').addEventListener('click', sendChat);
document.getElementById('chat-in').addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });

// ── WebSocket ─────────────────────────────────────────────────────────────────
// ── Slot binding ──────────────────────────────────────────────────────────────
function freeSlot() {
  for (let n = 1; n <= MAXP; n++) if (!players[n].sessionId) return n;
  return null;
}

function bindSession(summary) {
  // summary: {sessionId, label, haltFlag, lastActionAt, ...}
  if (slotOf[summary.sessionId]) {
    const n = slotOf[summary.sessionId];
    players[n].label = summary.label;
    players[n].halted = !!summary.haltFlag;
    return n;
  }
  const n = freeSlot();
  if (!n) return null;      // couch is full — extra sessions just aren't shown
  slotOf[summary.sessionId] = n;
  Object.assign(players[n], { sessionId: summary.sessionId, label: summary.label,
                              halted: !!summary.haltFlag });
  fetchSlot(n);
  return n;
}

async function fetchSlot(n) {
  const p = players[n];
  if (!p.sessionId) return;
  try {
    const [s, m] = await Promise.all([
      fetch(`/state?session=${p.sessionId}`).then(r=>r.json()),
      fetch(`/map?session=${p.sessionId}`).then(r=>r.json()),
    ]);
    if (!s.error) p.state = s;
    if (!m.error) p.map = m;
    renderCell(n);
  } catch(e) { console.error(e); }
}

function bindFromList(summaries) {
  // 'default' owns slot 1; the rest fill by most recent activity.
  const rest = summaries.filter(s => s.sessionId !== 'default')
                        .sort((a,b) => (b.lastActionAt||0) - (a.lastActionAt||0));
  const def = summaries.find(s => s.sessionId === 'default');
  if (def) bindSession(def);
  for (const s of rest) bindSession(s);
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  // No ?session param -> server leaves us on 'default', which receives EVERY
  // session's broadcasts tagged with sessionId. Exactly what a couch wants.

  ws.onmessage = evt => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }

    if (msg.event === 'connected') {
      if (msg.sessions) bindFromList(msg.sessions);
      if (msg.myName) {
        myName = msg.myName;
        document.getElementById('my-name').textContent = `You are: ${myName}`;
      }
      if (msg.chatHistory) msg.chatHistory.forEach(addChatMsg);
    }
    if (msg.event === 'session_created' && msg.session) bindSession(msg.session);
    if (msg.event === 'session_removed' && msg.sessionId) clearSlot(msg.sessionId);
    if (msg.event === 'state_update' || msg.event === 'reset') {
      const n = slotOf[msg.sessionId || 'default'];
      if (n) {
        if (msg.map) players[n].map = msg.map;
        if (msg.state) players[n].state = msg.state;
        renderCell(n);
      }
    }
    if (msg.event === 'halted') {
      const n = slotOf[msg.sessionId || 'default'];
      if (n) { players[n].halted = !!msg.halted; renderCell(n); }
    }
    if (msg.event === 'chat') addChatMsg(msg.msg);
  };

  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}

// Boot: bind current sessions, then keep labels/halt flags fresh.
function refreshSessions() {
  fetch('/sessions').then(r=>r.json()).then(bindFromList).catch(()=>{});
}
refreshSessions();
setInterval(refreshSessions, 30000);
for (let n = 1; n <= MAXP; n++) renderCell(n);
connect();
</script>
